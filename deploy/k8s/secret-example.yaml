apiVersion: v1
kind: Secret
metadata:
  name: weather-lsa-secrets
  labels:
    app: weather-lsa
# For file-like secrets, using 'Opaque' is fine; mount as files
type: Opaque
data:
  # Base64-encoded contents of your local secrets files
  # Example: cat secrets/client_secret.json | base64 -w0
  client_secret.json: ""
  token.json: ""
