apiVersion: v1
kind: Service
metadata:
  name: weather-lsa
  labels:
    app: weather-lsa
spec:
  selector:
    app: weather-lsa
  ports:
    - name: http-health
      port: 8080
      targetPort: http-health
    - name: http-metrics
      port: 9108
      targetPort: http-metrics
  type: ClusterIP
