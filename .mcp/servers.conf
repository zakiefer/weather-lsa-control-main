# MCP servers configuration
#
# Format: name|command
# - One server per line, separated by a single pipe character.
# - Commands are executed via: bash -lc "<command>" from the workspace root.
# - You can set environment variables inline before the command (e.g., FOO=bar BAR=baz <cmd>).
# - To use a different working directory, prefix the command with an inline cd, e.g.,
#     my-server|cd path/to/dir && my-server-mcp start
#
# Tips:
# - Override ports/tokens via your shell environment or inline env. Examples:
#     export FIGMA_HTTP_PORT=3999
#     export OPENROUTER_API_KEY=...   # for LLM router or similar clients
# - Comment out lines for servers you haven't installed yet.
# - Add new servers with the default pattern: <name>|<name>-mcp start

# Project-local server (kept as-is)
llm-router|cd mcp/llm-router && node dist/index.js

# Special-case figma HTTP server (port configurable via FIGMA_HTTP_PORT)
# Keep this exact entry name and command as requested.
# Use local Figma HTTP server implementation (no global package required)
figma|FIGMA_HTTP_PORT=3855 node mcp/figma-server-http.js

# Standard MCP servers (default command: "<name>-mcp start")
# Known available servers (disabled by default; many stdio-only binaries exit without a client)
# playwright|playwright-mcp start
# deepwiki|deepwiki-mcp start
# firecrawl|firecrawl-mcp start

# Optional servers (disabled by default). Uncomment once installed and configured.
# github|github-mcp start
# sentry|sentry-mcp start
# huggingface|huggingface-mcp start
# markitdown|markitdown-mcp start
# microsoft-docs|microsoft-docs-mcp start
# context7|context7-mcp start
# imagesorcery|imagesorcery-mcp start
# codacy|codacy-mcp start
# sequentialthinking|sequentialthinking-mcp start
# memory|memory-mcp start
# apify|apify-mcp start
# clarity|clarity-mcp start
