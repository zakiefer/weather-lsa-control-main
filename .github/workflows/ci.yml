
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      PYTHON_VERSION: '3.13'
      IMAGE: ${{ github.repository }}:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dev dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -U pip
          pip install -r requirements-dev.txt
          pip install pyright pip-audit bandit

      - name: Lint (ruff)
        continue-on-error: true
        run: |
          . .venv/bin/activate
          ruff check .

      - name: Type-check (mypy)
        continue-on-error: true
        run: |
          . .venv/bin/activate
          mypy src

      - name: Type-check (pyright)
        continue-on-error: true
        run: |
          . .venv/bin/activate
          pyright --version
          pyright

      - name: Unit tests
        run: |
          . .venv/bin/activate
          pytest -q --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml --cov-report=html:reports/htmlcov

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: reports/htmlcov

      - name: pip-audit (non-blocking)
        if: always()
        continue-on-error: true
        run: |
          . .venv/bin/activate
          pip-audit -r requirements.txt -r requirements-dev.txt

      - name: bandit (non-blocking)
        if: always()
        continue-on-error: true
        run: |
          . .venv/bin/activate
          bandit -q -r src

      - name: "Guard: requests.post must set timeout"
        run: |
          . .venv/bin/activate
          python tools/check_requests_timeouts.py

      - name: Doctor-live (fail on blocking issues)
        env:
          ENABLE_NOTIFICATIONS: 'false'
          GOOGLE_ADS_DEVELOPER_TOKEN: 'dummy'
          GOOGLE_ADS_CUSTOMER_ID: '0000000000'
          GOOGLE_ADS_CAMPAIGN_ID: '1111111111'
        shell: bash
        run: |
          set -euo pipefail
          . .venv/bin/activate
          # Capture output and fail if we detect FAIL
          out=$(python -m src --doctor-live || true)
          echo "$out"
          if echo "$out" | grep -q 'Doctor-live: FAIL'; then
            echo 'doctor-live reported FAIL; failing pipeline.'
            exit 1
          fi

      - name: Prepare Ads secrets (optional)
        # Only run on non-PR events or same-repo PRs to avoid fork secret exposure.
        if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository) }}
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          # Mark presence of secrets and export to future steps when available
          if [ -z "${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}" ] || [ -z "${{ secrets.GOOGLE_ADS_OAUTH }}" ]; then
            echo "HAS_ADS_SECRETS=false" >> $GITHUB_ENV
            exit 0
          fi
          echo "HAS_ADS_SECRETS=true" >> $GITHUB_ENV
          echo "GOOGLE_ADS_DEVELOPER_TOKEN=${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}" >> $GITHUB_ENV
          echo "GOOGLE_ADS_LOGIN_CUSTOMER_ID=${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}" >> $GITHUB_ENV
          echo "GOOGLE_ADS_CUSTOMER_ID=${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}" >> $GITHUB_ENV
          echo "GOOGLE_ADS_CAMPAIGN_ID=${{ secrets.GOOGLE_ADS_CAMPAIGN_ID }}" >> $GITHUB_ENV
          echo "GOOGLE_ADS_API_VERSION_CANARY=${{ secrets.GOOGLE_ADS_API_VERSION_CANARY }}" >> $GITHUB_ENV
          echo "GOOGLE_ADS_OAUTH=${{ secrets.GOOGLE_ADS_OAUTH }}" >> $GITHUB_ENV

      - name: Doctor-ads-canary (optional)
        # Avoid referencing `secrets` in expressions, which fails for fork PRs.
        # Run only on non-PR events or same-repo PRs; skip inside step if secrets are missing.
        if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository) }}
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          . .venv/bin/activate
          if [ "${HAS_ADS_SECRETS:-false}" != "true" ] || [ -z "${GOOGLE_ADS_DEVELOPER_TOKEN:-}" ] || [ -z "${GOOGLE_ADS_OAUTH:-}" ]; then
            echo "Ads canary skipped: missing secrets."
            exit 0
          fi
          mkdir -p secrets
          # Expect GOOGLE_ADS_OAUTH to contain token.json content
          printf '%s' "$GOOGLE_ADS_OAUTH" > secrets/token.json
          echo "Probing Ads canary version..."
          python -m src --doctor-ads-canary

      - name: Build Docker image
        if: ${{ success() }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE }}

  push-image:
    needs: build-test
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        shell: bash
        run: |
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}

  deploy:
    needs: push-image
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy secrets
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.K8S_CONFIG }}" ]; then
            echo "HAS_K8S=false" >> $GITHUB_ENV
            exit 0
          fi
          echo "HAS_K8S=true" >> $GITHUB_ENV
          # K8S_CONFIG may be multiline; use heredoc syntax for GITHUB_ENV
          {
            echo 'K8S_CONFIG<<__EOF__'
            echo "${{ secrets.K8S_CONFIG }}"
            echo '__EOF__'
          } >> "$GITHUB_ENV"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'
        if: ${{ env.HAS_K8S == 'true' }}

      - name: Configure kubeconfig
        if: ${{ env.HAS_K8S == 'true' }}
        run: |
          mkdir -p $HOME/.kube
          echo "$K8S_CONFIG" > $HOME/.kube/config
        env:
          K8S_CONFIG: ${{ env.K8S_CONFIG }}

      - name: Compute deploy image
        if: ${{ env.HAS_K8S == 'true' }}
        shell: bash
        run: |
          if [ -n "$DOCKER_IMAGE" ]; then
            echo "IMAGE=$DOCKER_IMAGE" >> $GITHUB_ENV
          else
            echo "IMAGE=ghcr.io/$GITHUB_REPOSITORY:$GITHUB_SHA" >> $GITHUB_ENV
          fi

      - name: Patch deployment image
        if: ${{ env.HAS_K8S == 'true' }}
        run: |
          kubectl set image deployment/weather-lsa weather-lsa=$IMAGE --record

      - name: Wait for rollout
        if: ${{ env.HAS_K8S == 'true' }}
        run: |
          kubectl rollout status deployment/weather-lsa --timeout=180s
